version: '3.8'

services:

  db:
    image: postgres:15
    restart: always
    environment:

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: shorty_db
    
    ports:
      - "5432:5432"

    volumes:
      - shorty_db_data:/var/lib/postgresql/data


  backend:

    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
  
  volumes:
    shorty_db_data: